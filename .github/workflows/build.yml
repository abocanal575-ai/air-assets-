name: Generate Assets.car

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Assets.car
        run: |
          mkdir -p compiled
          xcrun actool Assets.xcassets --compile compiled --platform iphoneos --minimum-deployment-target 12.0 --app-icon AppIcon --output-partial-info-plist compiled/partial.plist
          ls -la compiled

      - name: Verify splash
        run: xcrun --sdk iphoneos assetutil --info compiled/Assets.car | grep -i splash || echo "splash non trouve"

      - name: Upload Assets.car
        uses: actions/upload-artifact@v4
        with:
          name: Assets-car
          path: compiled/Assets.car
